version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ecolink_db
    environment:
      POSTGRES_USER: ecolink_user
      POSTGRES_PASSWORD: ecolink_secure_password
      POSTGRES_DB: ecolink
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ecolink_network

  # pgAdmin (herramienta de administración de PostgreSQL - opcional)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ecolink_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - ecolink_network

volumes:
  postgres_data:

networks:
  ecolink_network:
    driver: bridge
